version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pharma_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_a_changer
      POSTGRES_DB: pharma_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pharma_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: pharma_backend
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "80:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password_a_changer@db:5432/pharma_erp
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
      - SECRET_KEY=cle-secrete-production-tres-longue-et-robuste
    # On ne monte pas le volume .:/app en production pour plus de sécurité
    # volumes:
    #   - .:/app

volumes:
  postgres_data:
