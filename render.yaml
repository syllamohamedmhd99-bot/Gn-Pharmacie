services:
  # A Docker web service
  - type: web
    name: pharma-cloud-erp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn run:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_TYPE
        value: redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: pharma-redis
          property: connectionString

databases:
  - name: pharma-db
    plan: free

services:
  - type: redis
    name: pharma-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
