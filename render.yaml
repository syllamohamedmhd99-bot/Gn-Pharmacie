services:
  # L'application Web Flask
  - type: web
    name: pharma-cloud-erp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app import create_app, db; app=create_app('production'); with app.app_context(): db.create_all(); print('DB Ready')" && gunicorn run:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_TYPE
        value: redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: pharma-redis
          property: connectionString

  # Service Redis pour les sessions
  - type: redis
    name: pharma-redis
    plan: free
    ipAllowList: [] # Autorise uniquement les connexions internes

databases:
  - name: pharma-db
    plan: free
